name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

      - name: Build index from vendored SVDs + datasheets (smoke)
        run: >-
          chipsage-build
          --svd data/svd/RP2040.svd data/svd/RP2350.svd
          --pdf data/pdf/rp2040-datasheet.pdf data/pdf/rp2350-datasheet.pdf
          -o chipsage.db --strict
